<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moodly</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<h1>Moodly</h1>

<p>Seu humor também conta sua história</p>

<div class="moods">
<span class="mood" onclick="setMood('😊')">😊</span>
<span class="mood" onclick="setMood('😐')">😐</span>
<span class="mood" onclick="setMood('😴')">😴</span>
<span class="mood" onclick="setMood('😡')">😡</span>
</div>

<textarea id="note" placeholder="Escreve como foi seu dia..."></textarea>

<button onclick="saveMood()">Salvar Humor</button>

<div class="result" id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
